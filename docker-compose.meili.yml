services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: flipkart-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-DEV_MEILI_MASTER_KEY_CHANGE_ME}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
